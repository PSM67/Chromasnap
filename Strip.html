<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChromaSnap</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f4ad8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

body{
    margin:0;
    font-family:Kanit,sans-serif;
    background:linear-gradient(135deg,#eef1ff,#ffffff);
}

.wrap{
    padding:20px;
}

.head{
    font-size:26px;
    font-weight:bold;
    margin-left:50px;
    color:#4f4ad8;
}

.discribe{
    font-size:18px;
    color:#4f4ad8;
    opacity:0.7;
    margin-top:-10px;
    margin-left:50px;
    border-bottom:1px solid #4f4ad8;
    padding-bottom:5px;
}

.btn{
    position:absolute;
    right:40px;
    top:70px;
}

.btn a{
    color:#4f4ad8;
    text-decoration:none;
}

.UP{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-top:40px;
    width:320px;
    height:420px;
    border:3px dashed #4f4ad8;
    border-radius:18px;
    background:white;
    overflow:hidden;
    position: relative;
    cursor: pointer;
    /* Prevent default browser pan/zoom layout freezes during drag events */
    touch-action: none; 
}

.UP:hover{
    transform:translateY(-5px);
}

#uploadHint {
    color: #4f4ad8;
    font-size: 16px;
    text-align: center;
    opacity: 0.7;
    position: absolute;
    pointer-events: none;
}

#preview{
    width:100%;
    height:100%;
    object-fit:contain;   
    border-radius:10px;
    display:none;
}

.roi-canvas {
    position: absolute;
    top: 0;
    left: 0;
    cursor: crosshair;
}

.roi-indicator {
    position: absolute;
    bottom: 10px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    text-align: center;
    z-index: 10;
}

.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:8px;
    background:#4f4ad8;
    color:white;
    font-family:Kanit;
    cursor:pointer;
    font-size: 15px;
    transition: all 0.2s ease;
}

button:hover {
    background: #3f3da7;
}

.result{
    width:320px;
    margin:30px auto;
    padding:20px;
    background:white;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
}
        
.result h3{
    margin-top:0;
    color:#4f4ad8;
}

#resultText{
    font-size:18px;
    color:#333;
    margin-top:10px;
}

.history {
    text-align: center;
    margin-bottom: 30px;
}

.history a {
    color: #4f4ad8;
    text-decoration: none;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width:600px){
    .wrap { padding:15px; }
    .head{ margin-left:20px; font-size:22px; }
    .discribe{ margin-left:20px; width:auto; font-size:16px; }
    .btn{ right:20px; top:30px; }
    
    .UP{
        width:90%;
        height:340px;
        margin-top:40px;
    }
    .controls {
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }
    button {
        width: 90%;
        padding: 12px;
    }
    .result {
        width: 90%;
    }
}
</style>
</head>

<body>

<div class="wrap">
    <div class="head">
        <h3>ChromaSnap</h3>
    </div>
    <div class="discribe">
        <p>Strip Detection Mode</p>
    </div>
    <div class="btn">
        <a href="homepage.html">← BACK</a>
    </div>
</div>

<div class="UP" id="dropZone">
    <span id="uploadHint">Tap here to capture or select image</span>
    <img id="preview">
    <canvas id="roiCanvas" class="roi-canvas"></canvas>
    <div id="roiStatus" class="roi-indicator" style="display:none;">Select: Result Band</div>
</div>

<form id="uploadForm" class="controls">
    <input type="file" id="imgIN" accept="image/*" style="display: none;">
    <button type="button" onclick="measure()" class="upload">Measure</button>
    <button type="button" onclick="uploadFile()" class="save">Save</button>
</form>

<div class="result">
    <h3>Detection Result</h3>
    <p class="conc">concentration (ng/μL) : <span id="conc">-</span></p>
    <div id="resultText"></div>
</div>

<div class="history">
    <a href="history.html">history →</a>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabase = createClient(
    "https://dmuxjdpfvhnenxvpcemd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtdXhqZHBmdmhuZW54dnBjZW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDU4MjAsImV4cCI6MjA4ODc4MTgyMH0.BeJcnNblEK6zkMsbiIAm3OSbnGHWP_GYTKjqFoKOIbc"
)

const BUCKET = "Chromasnap"
const TABLE = "Strip"
const input = document.getElementById("imgIN");
const preview = document.getElementById("preview");
const canvas = document.getElementById("roiCanvas");
const ctx = canvas.getContext("2d");
const roiStatus = document.getElementById("roiStatus");
const dropZone = document.getElementById("dropZone");
const uploadHint = document.getElementById("uploadHint");

let currentStep = 0; 
const steps = [
    { label: "1/3 Drag: Result Band", color: "#ff0000" },
    { label: "2/3 Drag: Background", color: "#00ff00" },
    { label: "3/3 Drag: Control Band (Upper)", color: "#0000ff" }
];

let rois = { result: null, bg: null, upper: null };
let isDrawing = false;
let startX, startY;
let scaleX = 1, scaleY = 1;

// Only trigger camera file window picker when frame contains no image
dropZone.addEventListener("click", (e) => {
    if (preview.style.display !== "block") {
        input.click();
    }
});

input.addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = "block";
            uploadHint.style.display = "none";
            
            preview.onload = function() {
                canvas.width = preview.clientWidth;
                canvas.height = preview.clientHeight;
                canvas.style.width = preview.clientWidth + "px";
                canvas.style.height = preview.clientHeight + "px";
                
                scaleX = preview.naturalWidth / preview.clientWidth;
                scaleY = preview.naturalHeight / preview.clientHeight;
                
                resetRois();
            }
        }
        reader.readAsDataURL(file);
    }
});

function resetRois() {
    currentStep = 0;
    rois = { result: null, bg: null, upper: null };
    roiStatus.style.display = "block";
    updateStatusText();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function updateStatusText() {
    if (currentStep < 3) {
        roiStatus.innerHTML = steps[currentStep].label + "<br><small style='color:#bbb;'>(Tap with two fingers to undo)</small>";
    } else {
        roiStatus.innerHTML = "Done! Drag again to reset<br><small style='color:#bbb;'>(Tap with two fingers to undo)</small>";
    }
}

function undoLastStep() {
    if (currentStep > 0) {
        currentStep--;
        if (currentStep === 0) rois.result = null;
        if (currentStep === 1) rois.bg = null;
        if (currentStep === 2) rois.upper = null;
        
        updateStatusText();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        redrawSavedRois();
    }
}

// Support desktop mouse right click fallback options
canvas.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    undoLastStep();
});

// Helper coordinate logic mapping coordinates cleanly across layouts
function getCoordinates(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) {
        return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    } else {
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }
}

function startDrawing(e) {
    // Mobile alternative shortcut tool: If two fingers touch screen together, handle undo
    if (e.touches && e.touches.length > 1) {
        e.preventDefault();
        isDrawing = false;
        undoLastStep();
        return;
    }

    if (preview.style.display !== "block") return;
    if (currentStep >= 3) resetRois();

    const coords = getCoordinates(e);
    startX = coords.x;
    startY = coords.y;
    isDrawing = true;
}

function drawMove(e) {
    if (!isDrawing) return;
    e.preventDefault(); // CRITICAL: Stop phone view scrolling while sliding finger across canvas

    const coords = getCoordinates(e);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    redrawSavedRois();
    
    ctx.strokeStyle = steps[currentStep].color;
    ctx.lineWidth = 2;
    ctx.strokeRect(startX, startY, coords.x - startX, coords.y - startY);
}

function stopDrawing(e) {
    if (!isDrawing) return;
    isDrawing = false;

    // Use changedTouches for touch ending endpoints data
    let endX, endY;
    const rect = canvas.getBoundingClientRect();
    if (e.changedTouches && e.changedTouches.length > 0) {
        endX = e.changedTouches[0].clientX - rect.left;
        endY = e.changedTouches[0].clientY - rect.top;
    } else {
        endX = e.clientX - rect.left;
        endY = e.clientY - rect.top;
    }

    if (Math.abs(endX - startX) < 8 || Math.abs(endY - startY) < 8) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        redrawSavedRois();
        return;
    }

    const targetRoi = {
        x1: Math.min(startX, endX) * scaleX,
        y1: Math.min(startY, endY) * scaleY,
        x2: Math.max(startX, endX) * scaleX,
        y2: Math.max(startY, endY) * scaleY
    };

    if (currentStep === 0) rois.result = targetRoi;
    else if (currentStep === 1) rois.bg = targetRoi;
    else if (currentStep === 2) rois.upper = targetRoi;
    
    currentStep++;
    updateStatusText();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    redrawSavedRois();
}

// Unify tracking events arrays across platforms directly
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", drawMove);
canvas.addEventListener("mouseup", stopDrawing);

canvas.addEventListener("touchstart", startDrawing, { passive: false });
canvas.addEventListener("touchmove", drawMove, { passive: false });
canvas.addEventListener("touchend", stopDrawing);

function redrawSavedRois() {
    const keys = ["result", "bg", "upper"];
    keys.forEach((key, idx) => {
        if (rois[key]) {
            ctx.strokeStyle = steps[idx].color;
            ctx.lineWidth = 2;
            ctx.strokeRect(
                rois[key].x1 / scaleX,
                rois[key].y1 / scaleY,
                (rois[key].x2 - rois[key].x1) / scaleX,
                (rois[key].y2 - rois[key].y1) / scaleY
            );
        }
    });
}

document.getElementById("uploadForm").addEventListener("submit", (e) => e.preventDefault());

async function measure(){
    const file = input.files[0];
    if(!file){
        alert("Please select image");
        return;
    }
    if(currentStep < 3){
        alert("Please draw all 3 regions (Result, Background, and Control) first!");
        return;
    }
    
    const formData = new FormData();
    formData.append("image", file);
    formData.append("rois", JSON.stringify(rois));

    try{
        const res = await fetch(
            "https://chromasnap1.onrender.com/predict", // Update to matching deployed server URL dynamically
            {
                method: "POST",
                body: formData
            }
        );
        
        let data = await res.json();
        if(data.status === "success"){
            document.getElementById("conc").innerText = parseFloat(data.value).toFixed(2);
        } else {
            document.getElementById("conc").innerText = "Error parsing result";
        }
    }
    catch(error){
        console.error(error);
        alert("Cannot connect to backend server");
    }
}
window.measure = measure;

window.uploadFile = async function () {
    const file = input.files[0];
    const conc = document.getElementById("conc").innerText;
 
    if (!file) {
        alert("Please select file");
        return;
    }

    const filename = Date.now() + "_" + file.name;

    try {
        const { error: fileError } = await supabase.storage
            .from(BUCKET)
            .upload(filename, file);

        if (fileError) {
            alert(fileError.message);
            return;
        }

        const { error } = await supabase
            .from(TABLE)
            .insert([
                {
                    filename: filename,
                    date: new Date().toISOString(),
                    conc: isNaN(parseFloat(conc)) ? 0 : parseFloat(conc)
                }
            ]);

        if (error) {
            alert(error.message);
            return;
        }

        alert("Save success");
    } catch (err) {
        console.error(err);
        alert("Upload failed");
    }
}
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registered!', reg))
        .catch(err => console.error('Service Worker registration failed: ', err));
    });
  }
</script>

</body>
</html>
