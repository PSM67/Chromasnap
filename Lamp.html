<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromaSnap - LAMP Mode</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght=300;400;500;600&display=swap');
body{ margin:0; font-family:Kanit,sans-serif; background:linear-gradient(135deg,#eef1ff,#ffffff); }
.wrap{ padding:20px; }
.result{ width:320px; background-color: #ffffff; box-shadow:0 10px 30px rgba(0,0,0,0.08); border-radius:18px; padding:20px; margin:30px auto; }
.head{ font-size:26px; font-weight:bold; margin-left:50px; color:#4f4ad8; }
.discribe{ font-size:18px; color:#4f4ad8; opacity:0.7; margin-top:-10px; margin-left:50px; border-bottom:1px solid #4f4ad8; padding-bottom:5px; }
.btn{ position:absolute; right:40px; top:70px; }
.btn a{ color:#4f4ad8; text-decoration:none; }
.UP{ display:flex; align-items:center; justify-content:center; margin:auto; margin-top:40px; width:320px; height:420px; border:3px dashed #4f4ad8; border-radius:18px; background:white; overflow:hidden; position: relative; }
button{ margin-top:15px; padding:10px 25px; border:none; border-radius:8px; background:#4f4ad8; color:white; font-family:Kanit; cursor:pointer; }
#preview{ width:100%; height:100%; object-fit:cover; border-radius:10px; display:none; }
.selecting{ margin:20px auto; text-align:center; }
@media (max-width:600px){
.wrap{ padding:15px; } .head{ margin-left:10px; font-size:22px; } .discribe{ margin-left:10px; font-size:15px; }
.btn{ position:absolute; top:20px; right:15px; } .UP{ width:92%; height:260px; margin-top:30px; }
button{ width:90%; padding:12px; font-size:16px; } .result{ width:90%; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

<div class="wrap">
    <div class="head"><h3>ChromaSnap</h3></div>
    <div class="discribe"><p>Lamp color Detection Mode </p></div>
    <div class="btn"><a href="homepage.html">← back</a></div>
</div>

<div class="UP"><img id="preview"></div>

<form id="uploadForm1" style="display:flex; flex-direction:column; align-items:center;">
    <input type="file" id="imgIN" accept="image/*" style="margin-top:20px;">
    <button type="button" onclick="measure()">Measure</button>
    <button type="button" onclick="uploadFile()">Save</button>
</form>

<div class="selecting">
    <label for="resultSelect">Select pathogen: </label>
    <select id="resultSelect" required>
        <option value="" disabled selected>Choose</option>
        <option value="1">oxa23</option>
        <option value="2">oxa51</option>
    </select>
</div>

<div class="result">
    <h3>Detection Result:</h3>
    <span id="tpn">pathogen : <span id="type">-</span></span><br>
    <p class="conc">concentration (ng/μL) : <span id="conc">-</span></p>
</div>

<div style="text-align:center; margin-bottom:40px;"><a href="history.html" style="color:#4f4ad8; text-decoration:none;">history →</a></div>

<script>
const DB_NAME = "ChromaSnapLocalDB";
let yoloSession = null, xgbSession = null;

async function loadModels() {
    try {
        yoloSession = await ort.InferenceSession.create('./best.onnx');
        xgbSession = await ort.InferenceSession.create('./xgb_regression.onnx');
        console.log("LAMP Offline Engines successfully active.");
    } catch (e) {
        console.error("Failed to load ONNX models. Check file paths or CORS policy:", e);
    }
}
window.addEventListener('load', loadModels);

const input = document.getElementById("imgIN");
const preview = document.getElementById("preview");

input.addEventListener("change", function(){
    const file = this.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){ preview.src = e.target.result; preview.style.display = "block"; }
        reader.readAsDataURL(file);
    }
});

function preprocessYOLO(imgElement) {
    const canvas = document.createElement('canvas');
    canvas.width = 640; canvas.height = 640;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgElement, 0, 0, 640, 640);
    const data = ctx.getImageData(0, 0, 640, 640).data;
    
    const floatData = new Float32Array(3 * 640 * 640);
    for (let i = 0; i < 640 * 640; i++) {
        floatData[i] = data[i * 4] / 255.0;           // R channel
        floatData[i + 640*640] = data[i * 4 + 1] / 255.0; // G channel
        floatData[i + 2*640*640] = data[i * 4 + 2] / 255.0; // B channel
    }
    return new ort.Tensor('float32', floatData, [1, 3, 640, 640]);
}

async function measure() {
    if(!input.files[0]) { alert("Please select image"); return; }
    if(!yoloSession) { alert("YOLO model is not loaded yet. Check console errors."); return; }
    
    const tensorInput = preprocessYOLO(preview);
    const yoloResults = await yoloSession.run({ [yoloSession.inputNames[0]]: tensorInput });
    
    const outputTensor = yoloResults[yoloSession.outputNames[0]];
    const outputField = outputTensor.data; 
    
    console.log("--- ChromaSnap Live Diagnostics ---");
    console.log("Your Model Output Shape:", outputTensor.dims); 
    console.log("Flattened Array Size:", outputField.length);

    let bestConf = 0, bestBox = null;
    let maxFoundConf = 0; 
    const totalDetections = 8400; 
    
    if (outputField.length < 6 * totalDetections) {
        console.warn(`Warning: Expected at least ${6 * totalDetections} elements, but got ${outputField.length}. Your ONNX model may have a different configuration.`);
    }

    for(let i=0; i<totalDetections; i++) {
        let negConf = outputField[4 * totalDetections + i] || 0;
        let posConf = outputField[5 * totalDetections + i] || 0;
        let conf = Math.max(negConf, posConf);
        
        if (conf > maxFoundConf) {
            maxFoundConf = conf;
        }

        // Changed confidence threshold match window to 5% (0.05)
        if(conf > bestConf && conf > 0.05) { 
            bestConf = conf;
            bestBox = {
                cx: outputField[0 * totalDetections + i], cy: outputField[1 * totalDetections + i],
                w: outputField[2 * totalDetections + i], h: outputField[3 * totalDetections + i],
                cls: posConf > negConf ? "positive" : "negative"
            };
        }
    }

    console.log("Highest Confidence Found in Image:", (maxFoundConf * 100).toFixed(1) + "%");

    if(!bestBox) { 
        document.getElementById("type").innerText = `Not Detected (Max Conf: ${(maxFoundConf * 100).toFixed(1)}%)`; 
        document.getElementById("conc").innerText = "-";
        return; 
    }
    
    if(bestBox.cls === "negative") { 
        document.getElementById("type").innerText = "Negative"; 
        document.getElementById("conc").innerText = "-"; 
        return; 
    }

    document.getElementById("type").innerText = "Positive";

    // Client-side feature calculation from tube bounding box coordinates
    const scaleX = preview.naturalWidth / 640, scaleY = preview.naturalHeight / 640;
    const cropCanvas = document.createElement('canvas');
    const cw = bestBox.w * scaleX, ch = bestBox.h * scaleY;
    cropCanvas.width = Math.max(1, cw); cropCanvas.height = Math.max(1, ch);
    const cropCtx = cropCanvas.getContext('2d');
    cropCtx.drawImage(preview, (bestBox.cx - bestBox.w/2)*scaleX, (bestBox.cy - bestBox.h/2)*scaleY, cw, ch, 0, 0, cw, ch);
    
    const imgData = cropCtx.getImageData(0, 0, cropCanvas.width, cropCanvas.height).data;
    let sumL = 0, sumA = 0, sumB = 0, sumH = 0, sumS = 0, sumV = 0, count = 0;

    for(let i=0; i<imgData.length; i+=4) {
        let r=imgData[i]/255, g=imgData[i+1]/255, b=imgData[i+2]/255;
        let X = r*0.4124 + g*0.3576 + b*0.1804, Y = r*0.2126 + g*0.7152 + b*0.0722, Z = r*0.0193 + g*0.1192 + b*0.9504;
        let fx = X > 0.008856 ? Math.cbrt(X) : 7.787*X + 16/116, fy = Y > 0.008856 ? Math.cbrt(Y) : 7.787*Y + 16/116, fz = Z > 0.008856 ? Math.cbrt(Z) : 7.787*Z + 16/116;
        sumL += (116*fy - 16); sumA += 500*(fx - fy); sumB += 200*(fy - fz);
        
        let max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min, hVal = 0, sVal = max===0 ? 0 : d/max;
        if(max!==min) {
            if(max===r) hVal = (g-b)/d + (g<b?6:0); else if(max===g) hVal = (b-r)/d + 2; else hVal = (r-g)/d + 4;
            hVal /= 6;
        }
        sumH += hVal; sumS += sVal; sumV += max; count++;
    }

    const xgbInput = new Float32Array([sumL/count, sumA/count, sumB/count, sumH/count, sumS/count, sumV/count]);
    const xgbResults = await xgbSession.run({ [xgbSession.inputNames[0]]: new ort.Tensor('float32', xgbInput, [1, 6]) });
    document.getElementById("conc").innerText = parseFloat(xgbResults[xgbSession.outputNames[0]].data[0]).toFixed(2);
}

function uploadFile() {
    if(!input.files[0]) return;
    const record = {
        filename: Date.now() + "_" + input.files[0].name,
        conc: document.getElementById("conc").innerText,
        type: document.getElementById("type").innerText,
        date: new Date().toISOString(),
        pathogen: document.getElementById("resultSelect").value,
        imgBase64: preview.src
    };
    
    const request = indexedDB.open(DB_NAME, 1);
    request.onsuccess = (e) => {
        const tx = e.target.result.transaction("Chromasnaptab", "readwrite");
        tx.objectStore("Chromasnaptab").add(record);
        alert("Saved locally inside internal browser filesystem storage successfully.");
    };
}
</script>
</body>
</html>
